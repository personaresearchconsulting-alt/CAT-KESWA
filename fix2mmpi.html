let currentIndex = 0;
let jawaban = new Array(567).fill(null);

function mulaiTes() {
    if(!document.getElementById('nama').value || !document.getElementById('jk').value) return alert("Data tidak lengkap.");
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('test-view').style.display = 'flex';
    initNav();
    renderSoal();
}

function initNav() {
    const grid = document.getElementById('nav-grid');
    grid.innerHTML = '';
    DATA_SOAL.forEach((_, i) => {
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.id = `nav-${i}`;
        item.innerText = i + 1;
        item.onclick = () => { currentIndex = i; renderSoal(); };
        grid.appendChild(item);
    });
}

function renderSoal() {
    document.getElementById('q-count').innerText = `NOMOR ${currentIndex + 1} DARI 567`;
    document.getElementById('q-txt').innerText = DATA_SOAL[currentIndex];
    
    document.getElementById('btn-YA').className = 'btn-ans';
    document.getElementById('btn-TIDAK').className = 'btn-ans';
    if(jawaban[currentIndex] === 'YA') document.getElementById('btn-YA').classList.add('active-ya');
    if(jawaban[currentIndex] === 'TIDAK') document.getElementById('btn-TIDAK').classList.add('active-tidak');

    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('current'));
    const currentNav = document.getElementById(`nav-${currentIndex}`);
    if(currentNav) {
        currentNav.classList.add('current');
        currentNav.scrollIntoView({ behavior: 'auto', block: 'nearest' });
    }
}

function simpan(val) {
    jawaban[currentIndex] = val;
    document.getElementById(`nav-${currentIndex}`).classList.add('filled');
    renderSoal();
    setTimeout(() => { if (currentIndex < 566) { currentIndex++; renderSoal(); } }, 100);
}

function navigasi(s) {
    if (currentIndex + s >= 0 && currentIndex + s < 567) { currentIndex += s; renderSoal(); }
}

function selesai() {
    const sisa = jawaban.filter(a => a === null).length;
    if (sisa > 0) return alert(`Gagal Simpan! Masih ada ${sisa} soal yang belum Anda jawab.`);

    const nama = document.getElementById('nama').value.toUpperCase();
    const jk = document.getElementById('jk').value;
    const tgl = new Date().toLocaleString('id-ID');

    let konten = `LAPORAN HASIL MMPI-2\n`;
    konten += `--------------------------\n`;
    konten += `NAMA      : ${nama}\n`;
    konten += `JK        : ${jk}\n`;
    konten += `TANGGAL   : ${tgl}\n`;
    konten += `--------------------------\n\n`;

    jawaban.forEach((ans, index) => {
        konten += `${index + 1}. ${ans}\n`;
    });

    const blob = new Blob([konten], { type: 'text/plain' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `HASIL_MMPI2_${nama.replace(/\s+/g, '_')}.txt`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>
